<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TierZenith Leaderboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="leaderboard-container">
        
        <nav class="nav-tabs">
            <button class="tab-btn active"><i class="fa-solid fa-trophy"></i> Overall</button>
            <button class="tab-btn"><i class="fa-solid fa-crosshairs"></i> LTMs</button>
            <button class="tab-btn"><i class="fa-solid fa-cube"></i> Vanilla</button>
            <button class="tab-btn"><i class="fa-solid fa-heart"></i> UHC</button>
            <button class="tab-btn"><i class="fa-solid fa-flask"></i> Pot</button>
            <button class="tab-btn"><i class="fa-solid fa-ghost"></i> NethOP</button>
            <button class="tab-btn"><i class="fa-solid fa-circle"></i> SMP</button>
            <button class="tab-btn"><i class="fa-solid fa-shield-halved"></i> Sword</button>
        </nav>

        <div class="info-row">
            <button class="info-btn"><i class="fa-solid fa-circle-info"></i> Information</button>
            </div>
        </div>

        <div class="table-header">
            <div class="header-rank">#</div>
            <div class="header-player">PLAYER</div>
            <div class="header-region">REGION</div>
            <div class="header-tiers">TIERS</div>
        </div>

        <div class="player-list">
            
            <div class="player-row rank-1">
                <div class="rank-num">1.</div>
                <div class="player-info">
                    <div class="avatar-container">
                        <div class="avatar steve-placeholder"></div> 
                    </div>
                    <div class="player-meta">
                        <span class="player-name">ItzRealMe</span>
                        <span class="player-subtext"><i class="fa-solid fa-gem text-gold"></i> Combat Master <span class="points">(330 poin...)</span></span>
                    </div>
                </div>
                <div class="player-region">
                    <span class="badge badge-na">NA</span>
                </div>
                <div class="player-tiers-list">
                    <span class="tier tier-ht3">HT3</span>
                    <span class="tier tier-ht1 relative-tooltip">
                        HT1
                        <div class="tooltip">
                            <strong>Retired HT1</strong>
                            <span>60 points</span>
                        </div>
                    </span>
                    <span class="tier tier-lt2">LT2</span>
                    <span class="tier tier-lt2">LT2</span>
                </div>
            </div>

            <div class="player-row rank-2">
                <div class="rank-num">2.</div>
                <div class="player-info">
                    <div class="avatar-container">
                        <div class="avatar custom-placeholder"></div>
                    </div>
                    <div class="player-meta">
                        <span class="player-name">coldified</span>
                        <span class="player-subtext"><i class="fa-solid fa-gem text-gold"></i> Combat Master <span class="points">(326 poin...)</span></span>
                    </div>
                </div>
                <div class="player-region">
                    <span class="badge badge-eu">EU</span>
                </div>
                <div class="player-tiers-list">
                    <span class="tier tier-lt1">LT1</span>
                    <span class="tier tier-lt1">LT1</span>
                    <span class="tier tier-lt3">LT3</span>
                    <span class="tier tier-ht1">HT1</span>
                    <span class="tier tier-lt2">LT2</span>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
